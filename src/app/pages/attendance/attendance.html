<header class="page-head">
  <div>
    <span>متابعة يومية</span>
    <h1>الحضور والغياب</h1>
  </div>
</header>

<section class="layout">
  <div class="panel">
    <div class="sheet-head">
      <div>
        <h2>الحصص القادمة</h2>
      </div>
      <select [value]="groupFilter()" (change)="filterByGroup($any($event.target).value)">
        <option value="0">كل المجموعات</option>
        @for (group of groups(); track group.id) {
          <option [value]="group.id">{{ group.name }}</option>
        }
      </select>
    </div>

    @for (session of filteredSessions(); track session.id) {
      <button class="session" type="button" (click)="openSheet(session.id)">
        <strong>{{ session.groupName || 'مجموعة رقم ' + session.groupId }}</strong>
        <span>{{ session.sessionDate | appDate }} - {{ session.startTime | appTime12 }}</span>
      </button>
    } @empty {
      <p>لا توجد حصص. أنشئي حصة أو ولدي حصص من صفحة المجموعات.</p>
    }
  </div>

  <form class="panel builder-panel" [formGroup]="form" (ngSubmit)="createSession()">
    <div class="builder-head">
      <span>حصة يدوية</span>
      <h2>إنشاء حصة</h2>
    </div>

    <label class="field">
      المجموعة
      <select formControlName="groupId">
        <option [ngValue]="0">اختر المجموعة</option>
        @for (group of groups(); track group.id) {
          <option [ngValue]="group.id">{{ group.name }}</option>
        }
      </select>
    </label>

    <label class="field">
      تاريخ الحصة
      <input formControlName="sessionDate" type="date" />
    </label>

    <label class="field">
      وقت البداية
      <app-time-picker formControlName="startTime" />
    </label>
    <button type="submit">إضافة حصة</button>
  </form>
</section>
